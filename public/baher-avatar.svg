        <circle cx="69.5" cy="56.6" r="2.3" fill="#2a2320"/>
        <circle cx="51.3" cy="55.8" r="0.75" fill="#ffffff"/>
        <circle cx="70.3" cy="55.8" r="0.75" fill="#ffffff"/>
