      <rect width="2" height="2" fill="#d92040"/>
      <rect x="2" y="2" width="2" height="2" fill="#d92040"/>
    </pattern>
    <clipPath id="clip"><circle cx="60" cy="60" r="58"/></clipPath>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#bg)"/>

