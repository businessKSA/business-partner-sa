        <path d="M53.2 66.1 Q60 64.7 66.8 66.1 L66.4 69.3 Q60 70.4 53.6 69.3 Z" fill="#ffffff"/>
        <path d="M55.4 75.2 Q60 77.6 64.6 75.2 Q62.4 77.9 60 77.9 Q57.6 77.9 55.4 75.2 Z" fill="#b4574a"/>
