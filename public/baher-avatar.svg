      <ellipse cx="80" cy="58.5" rx="3.4" ry="5.4" fill="#e5ab79"/>
      <path d="M39.4 57 Q40.6 58.5 39.8 60.4" fill="none" stroke="#c98a5c" stroke-width="1"/>
      <path d="M80.6 57 Q79.4 58.5 80.2 60.4" fill="none" stroke="#c98a5c" stroke-width="1"/>
