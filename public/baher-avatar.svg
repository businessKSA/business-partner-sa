<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a84e8"/>
      <stop offset="1" stop-color="#0057ad"/>
    </linearGradient>
    <pattern id="shPat" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
