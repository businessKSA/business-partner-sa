<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="brand.css" />
<style>
  html, body { width: 1080px; height: 1350px; }
  .canvas { width: 1080px; height: 1350px; display: flex; flex-direction: column; justify-content: space-between; padding: 84px 76px 68px; }
  .motif { width: 620px; }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .eyebrow { font-size: 30px; }
  .eyebrow::before { content: "＋ "; color: var(--gold); }
  .body-block { display: flex; flex-direction: column; gap: 34px; max-width: 880px; }
  .headline { font-size: 86px; }
  .support { font-size: 38px; max-width: 780px; }
  .rule { width: 120px; }
  .bottom { display: flex; flex-direction: column; gap: 26px; }
  .wordmark { font-size: 24px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="motif bottom-start"></div>
    <div class="top">
      <div class="eyebrow">محتوى تعليمي</div>
    </div>
    <div class="body-block">
      <div class="rule"></div>
      <div class="headline">الحفظ أهم<br />من اللايك</div>
      <div class="support">نسبة التوطين تتغيّر كل موسم نطاقات — فريق بزنس بارتنر يتابعها عنك أولاً بأول ويجهّز الخطة قبل موعد المراجعة.</div>
    </div>
    <div class="bottom">
      <div class="wordmark"><span class="mark"></span> BUSINESS PARTNER <span class="ar">· بزنس بارتنر</span></div>
    </div>
  </div>
</body>
</html>
