<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="brand.css" />
<style>
  html, body { width: 1080px; height: 1080px; }
  .canvas { width: 1080px; height: 1080px; display: flex; flex-direction: column; justify-content: center; padding: 90px 88px; gap: 40px; }
  .motif { width: 520px; }
  .eyebrow { font-size: 30px; }
  .eyebrow::before { content: "⏳ "; }
  .rule { width: 110px; }
  .headline { font-size: 72px; }
  .support { font-size: 34px; max-width: 780px; }
  .wordmark { font-size: 22px; position: absolute; inset-inline-start: 88px; bottom: 64px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="motif top-end"></div>
    <div class="eyebrow">تذكير — موسم النطاقات</div>
    <div class="rule"></div>
    <div class="headline">موسم مراجعة النطاقات بدأ</div>
    <div class="support">راجع نسبة التوطين في منشأتك قبل ما تتفاجأ بتصنيف أقل — فريقنا يقدر يراجعها لك هالأسبوع.</div>
    <div class="wordmark"><span class="mark"></span> BUSINESS PARTNER <span class="ar">· بزنس بارتنر</span></div>
  </div>
</body>
</html>
