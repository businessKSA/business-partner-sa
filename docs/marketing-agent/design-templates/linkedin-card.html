<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="brand.css" />
<style>
  html, body { width: 1200px; height: 627px; }
  .canvas { width: 1200px; height: 627px; display: flex; flex-direction: column; padding: 56px 68px; }
  .row { display: grid; grid-template-columns: 1fr 260px; flex: 1; }
  .motif { width: 420px; }
  .left { display: flex; flex-direction: column; justify-content: center; gap: 26px; max-width: 720px; }
  .eyebrow { font-size: 24px; color: var(--navy); opacity: 0.7; }
  .headline { font-size: 54px; }
  .support-en { font-family: var(--latin); font-size: 24px; color: var(--ink-soft); letter-spacing: 0.01em; }
  .rule { width: 90px; background: var(--navy); }
  .right { display: flex; flex-direction: column; justify-content: center; align-items: flex-end; text-align: end; }
  .stat { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .stat .n { font-family: var(--display); font-size: 78px; color: var(--navy); line-height: 1; }
  .stat .l { font-family: var(--body); font-size: 22px; color: var(--ink-soft); }
  .footer { display: flex; justify-content: flex-end; padding-top: 20px; }
  .wordmark { font-size: 20px; white-space: nowrap; }
  .wordmark .ar { color: var(--ink); }
</style>
</head>
<body>
  <div class="canvas on-paper">
    <div class="motif top-end"></div>
    <div class="row">
      <div class="left">
        <div class="eyebrow">قوى · مدد · التأمينات — نظرة واحدة</div>
        <div class="rule"></div>
        <div class="headline">كل موسم نطاقات، القرار يوصل متأخر</div>
        <div class="support-en">Track Nitaqat, GOSI &amp; Qiwa together — before the review date.</div>
      </div>
      <div class="right">
        <div class="stat"><div class="n">3</div><div class="l">منصات تُراقَب<br />مع بعض</div></div>
      </div>
    </div>
    <div class="footer">
      <div class="wordmark"><span class="mark"></span> BUSINESS PARTNER <span class="ar">· بزنس بارتنر</span></div>
    </div>
  </div>
</body>
</html>
