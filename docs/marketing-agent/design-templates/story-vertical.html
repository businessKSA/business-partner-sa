<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="brand.css" />
<style>
  html, body { width: 1080px; height: 1920px; }
  .canvas { width: 1080px; height: 1920px; display: flex; flex-direction: column; justify-content: space-between; padding: 120px 84px 96px; }
  .motif { width: 720px; }
  .top { display: flex; justify-content: center; }
  .top .wordmark { font-size: 26px; }
  .middle { display: flex; flex-direction: column; gap: 40px; align-items: center; text-align: center; margin-top: 60px; }
  .rule { width: 130px; }
  .emoji { font-size: 88px; }
  .headline { font-size: 96px; line-height: 1.28; }
  .support { font-size: 36px; opacity: 0.82; max-width: 780px; }
  .bottom { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .tap { font-family: var(--body); font-size: 30px; color: var(--gold-soft); display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tap .arrow { font-size: 44px; color: var(--gold); }
</style>
</head>
<body>
  <div class="canvas">
    <div class="motif bottom-start"></div>
    <div class="top"><div class="wordmark"><span class="mark"></span> BUSINESS PARTNER</div></div>
    <div class="middle">
      <div class="rule"></div>
      <div class="emoji">😳</div>
      <div class="headline">إقاماتك تنتهي<br />وأنت ما تدري؟</div>
      <div class="support">كثير منشآت تكتشف انتهاء إقامة موظف بعد فوات الأوان — نتابعها يومياً عنك.</div>
    </div>
    <div class="bottom">
      <div class="tap"><span class="arrow">↑</span> تواصل وياتنا</div>
    </div>
  </div>
</body>
</html>
