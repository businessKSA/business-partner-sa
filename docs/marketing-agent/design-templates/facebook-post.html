<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="brand.css" />
<style>
  html, body { width: 1200px; height: 630px; }
  .canvas { width: 1200px; height: 630px; display: flex; flex-direction: column; justify-content: space-between; padding: 64px 72px; }
  .motif { width: 480px; }
  .eyebrow { font-size: 26px; }
  .eyebrow::before { content: "⏳ "; }
  .body-block { display: flex; flex-direction: column; gap: 22px; max-width: 760px; }
  .headline { font-size: 62px; }
  .support { font-size: 30px; max-width: 680px; }
  .rule { width: 100px; }
  .wordmark { font-size: 22px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="motif top-end"></div>
    <div class="eyebrow">تذكير — إقامات ورخص العمل</div>
    <div class="body-block">
      <div class="rule"></div>
      <div class="headline">موسم انتهاء الإقامات قادم</div>
      <div class="support">فريق بزنس بارتنر يتابع تواريخ إقامات موظفيك في مقيم/أبشر أعمال، وينبهك قبل الموعد بوقت كافٍ لأي إجراء.</div>
    </div>
    <div class="wordmark"><span class="mark"></span> BUSINESS PARTNER <span class="ar">· بزنس بارتنر</span></div>
  </div>
</body>
</html>
